steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/creahub-solutions/creahub/site:latest'
      - '.'

images:
  - 'europe-west1-docker.pkg.dev/creahub-solutions/creahub/site:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  diskSizeGb: 100
